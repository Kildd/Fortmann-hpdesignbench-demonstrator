name: Build site

# GitHub Pages is served from the committed `docs/` folder on `main`
# (Settings → Pages → Deploy from a branch → main → /docs).
# This workflow only verifies that `npm run build` still succeeds.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
